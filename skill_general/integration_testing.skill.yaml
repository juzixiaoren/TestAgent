# 集成测试技能
name: integration_testing
description: 集成测试技能，分别使用自顶向下（逐步追加 stub）和自底向上（逐步追加 driver）两种策略进行集成测试，验证模块间接口的正确性
version: 1.0.0

author:
  name: TestAgent
  email: testagent@example.com

tags:
  - testing
  - integration
  - interface

dependencies:
  - read_file
  - write_file
  - execute_command

capabilities:
  - 自顶向下集成测试（逐步追加 stub，测试后替换为真实模块）
  - 自底向上集成测试（逐步追加 driver，逐层验证）
  - 验证模块间接口的数据传递正确性
  - 验证模块间调用的参数匹配和返回值处理
  - 检测接口不一致、数据丢失等集成缺陷

examples:
  - description: 对订单系统进行集成测试
    input: "对 OrderService 及其依赖模块进行集成测试"
    output: "分别用自顶向下和自底向上策略进行集成测试，验证模块间接口正确性"

  - description: 对分层架构进行集成测试
    input: "对 Controller-Service-DAO 三层架构进行集成测试"
    output: "自顶向下从 Controller 开始逐步追加 stub，自底向上从 DAO 开始逐步追加 driver"

tool_instructions:
  read_file:
    description: 读取模块源代码和接口定义
    parameters:
      file_path: 模块源代码路径
  write_file:
    description: 编写 stub、driver 和集成测试代码
    parameters:
      file_path: 测试文件输出路径
      content: stub/driver/集成测试代码
  execute_command:
    description: 编译和运行集成测试
    parameters:
      command: 编译或运行测试命令
      working_dir: 项目工作目录

prompt_templates:
  top_down_step: "自顶向下集成第 {{step}} 步：已集成 {{integrated_modules}}，为 {{new_module}} 的未集成依赖 {{unintegrated}} 追加 stub，测试接口 {{interface}}"
  top_down_replace: "自顶向下替换：将 {{stub_name}} 替换为真实模块 {{real_module}}，验证接口一致性"
  bottom_up_step: "自底向上集成第 {{step}} 步：已集成 {{integrated_modules}}，为 {{new_module}} 追加 driver 调用其接口，验证输出"

security_notes:
  - 集成测试应注意事务一致性，测试后清理测试数据
  - stub 替换为真实模块时应验证行为一致性
  - 注意模块间接口的异常处理路径

config:
  allowed_directories:
    - "."
    - "./tests"
    - "./test_integration"
  max_file_size: 52428800
  allowed_file_types:
    - ".go"
    - ".py"
    - ".java"
    - ".js"
    - ".ts"
    - ".c"
    - ".cpp"
    - ".rs"
    - ".yaml"
    - ".yml"
    - ".json"

workflow:
  description: 集成测试的完整工作流，包含自顶向下和自底向上两次测试
  steps:
    - step: 1
      name: 分析模块依赖关系
      description: 读取源代码，分析模块间的调用关系和依赖层次
      actions:
        - 使用 read_file 读取各模块源代码
        - 识别模块间的调用关系（谁调用了谁）
        - 识别模块间的接口（参数、返回值、异常）
        - 构建模块依赖图（层次结构）
        - 确定自顶向下的测试顺序（从顶层模块到底层模块）
        - 确定自底向上的测试顺序（从底层模块到顶层模块）

    - step: 2
      name: 自顶向下集成测试
      description: 从顶层模块开始，逐步向下集成，每步追加 stub 替代未集成的下层模块，测试后替换为真实模块
      actions:
        - 从最顶层模块开始，为其所有下层依赖编写 stub
        - 使用 write_file 保存 stub 代码
        - 使用 execute_command 编译并测试顶层模块 + stub
        - 逐步向下：选择下一个要集成的下层模块
        - 为该模块的下层依赖编写新的 stub
        - 使用 execute_command 测试已集成模块 + 新模块 + 新 stub
        - 验证接口正确后，将之前的 stub 替换为真实模块
        - 重复以上步骤，直到所有模块集成完毕
        - 记录每步的测试结果和发现的缺陷

    - step: 3
      name: 自底向上集成测试
      description: 从底层模块开始，逐步向上集成，每步追加 driver 调用被测模块
      actions:
        - 从最底层模块开始，为其编写 driver
        - 使用 write_file 保存 driver 代码
        - 使用 execute_command 编译并运行 driver 测试底层模块
        - 逐步向上：选择下一个要集成的上层模块
        - 为上层模块编写 driver，调用已集成的下层模块
        - 使用 execute_command 编译并运行 driver 测试上层 + 已集成模块
        - 重复以上步骤，直到所有模块集成完毕
        - 记录每步的测试结果和发现的缺陷

    - step: 4
      name: 集成测试结果汇总
      description: 汇总两次集成测试的结果，对比两种策略的发现
      actions:
        - 汇总自顶向下测试的所有步骤结果
        - 汇总自底向上测试的所有步骤结果
        - 对比两种策略发现的缺陷差异
        - 识别仅在特定策略下才能发现的集成问题
        - 生成集成测试报告
