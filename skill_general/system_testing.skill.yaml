# 系统测试技能
name: system_testing
description: 系统测试技能，对整个系统进行端到端测试，验证系统整体满足功能需求和非功能需求
version: 1.0.0

author:
  name: TestAgent
  email: testagent@example.com

tags:
  - testing
  - system
  - end-to-end
  - non-functional

dependencies:
  - read_file
  - write_file
  - execute_command

capabilities:
  - 验证系统整体功能需求的满足程度
  - 验证非功能需求（性能、安全性、可靠性、兼容性、可用性）
  - 执行端到端测试场景，模拟真实用户操作
  - 检测系统级别的缺陷和异常
  - 评估系统整体质量

examples:
  - description: 对Web应用进行系统测试
    input: "对该 Web 应用进行系统测试"
    output: "验证功能需求和非功能需求，执行端到端场景测试，输出系统测试报告"

  - description: 对API服务进行系统测试
    input: "对该 REST API 服务进行系统测试"
    output: "验证API功能正确性、性能指标、安全性和可靠性，输出系统测试报告"

tool_instructions:
  read_file:
    description: 读取需求文档、配置文件和系统代码
    parameters:
      file_path: 需求文档或系统配置文件路径
  write_file:
    description: 编写系统测试用例和测试脚本
    parameters:
      file_path: 测试文件输出路径
      content: 系统测试用例或脚本代码
  execute_command:
    description: 启动系统、运行测试脚本、执行性能测试等
    parameters:
      command: 启动系统或运行测试的命令
      working_dir: 项目工作目录

prompt_templates:
  functional_test: "验证功能需求 {{requirement_id}}: {{requirement_desc}}，测试步骤：{{test_steps}}，预期结果：{{expected_result}}"
  performance_test: "验证性能指标 {{metric}}：目标 {{target}}，实际 {{actual}}，结果 {{pass_or_fail}}"
  security_test: "验证安全性要求 {{requirement}}：测试方法 {{method}}，结果 {{result}}"

security_notes:
  - 系统测试应在与生产环境隔离的测试环境中进行
  - 性能测试不应影响生产系统
  - 安全测试需遵守授权范围，不进行未授权的渗透测试
  - 测试数据应使用模拟数据，不使用真实用户数据

config:
  allowed_directories:
    - "."
    - "./tests"
    - "./test_system"
    - "./reports"
  max_file_size: 52428800
  allowed_file_types:
    - ".go"
    - ".py"
    - ".java"
    - ".js"
    - ".ts"
    - ".c"
    - ".cpp"
    - ".rs"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".md"
    - ".txt"

workflow:
  description: 系统测试的完整工作流
  steps:
    - step: 1
      name: 需求分析与测试计划
      description: 分析系统需求文档，制定系统测试计划
      actions:
        - 使用 read_file 读取需求文档
        - 提取所有功能需求项，建立需求追踪矩阵
        - 提取所有非功能需求（性能、安全性、可靠性、兼容性、可用性）
        - 为每项需求设计验证方法和验收标准
        - 制定系统测试计划（测试范围、环境、进度）

    - step: 2
      name: 功能需求验证
      description: 对系统整体进行功能测试，验证每项功能需求是否满足
      actions:
        - 根据需求追踪矩阵，为每项功能需求编写端到端测试用例
        - 模拟真实用户操作路径，从输入到输出完整验证
        - 使用 write_file 保存测试用例和脚本
        - 使用 execute_command 运行功能测试
        - 记录功能测试结果（通过/失败/部分通过）

    - step: 3
      name: 非功能需求验证 - 性能测试
      description: 验证系统是否满足性能指标要求
      actions:
        - 识别关键性能指标（响应时间、吞吐量、并发用户数、资源利用率）
        - 设计性能测试场景（正常负载、峰值负载、压力测试）
        - 编写性能测试脚本
        - 使用 execute_command 运行性能测试
        - 收集性能数据，与目标值对比
        - 记录性能测试结果

    - step: 4
      name: 非功能需求验证 - 安全性测试
      description: 验证系统是否满足安全性要求
      actions:
        - 检查输入验证和数据清洗
        - 检查认证和授权机制
        - 检查敏感数据保护（加密、脱敏）
        - 检查常见安全漏洞（注入、XSS、CSRF 等）
        - 记录安全性测试结果

    - step: 5
      name: 非功能需求验证 - 可靠性测试
      description: 验证系统的可靠性和容错能力
      actions:
        - 测试异常输入处理（无效数据、缺失参数、超大数据）
        - 测试故障恢复能力（服务中断恢复、数据一致性）
        - 测试长时间运行稳定性（内存泄漏、资源耗尽）
        - 记录可靠性测试结果

    - step: 6
      name: 系统测试报告
      description: 汇总所有系统测试结果，生成系统测试报告
      actions:
        - 汇总功能测试结果（需求覆盖率、通过率）
        - 汇总非功能测试结果（性能指标、安全评估、可靠性评估）
        - 列出发现的所有系统级缺陷
        - 评估系统整体质量等级
        - 给出系统是否可以发布的建议
        - 生成系统测试报告
