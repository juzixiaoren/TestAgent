# 示例 Skill 定义
name: sample_file_skill
description: 一个示例文件操作技能，演示如何使用工具进行文件操作
version: 1.0.0

# 技能作者信息
author:
  name: AI Assistant
  email: assistant@example.com

# 技能标签
tags:
  - file
  - utility
  - example

# 技能依赖（可选的工具列表）
dependencies:
  - read_file
  - write_file

# 技能能力描述
capabilities:
  - 读取文件内容
  - 写入文件内容
  - 基本的文件操作

# 使用示例
examples:
  - description: 读取README文件
    input: "读取README.md文件内容"
    output: "文件内容：[文件内容]，大小：[大小]字节"

  - description: 写入测试文件
    input: "创建一个test.txt文件，内容为'Hello World!'"
    output: "文件创建成功，路径：[路径]，大小：[大小]字节"

# 工具使用说明
tool_instructions:
  read_file:
    description: 使用read_file工具读取指定文件
    parameters:
      file_path: 要读取的文件路径（绝对或相对路径）

  write_file:
    description: 使用write_file工具写入内容到文件
    parameters:
      file_path: 要写入的文件路径
      content: 要写入的内容

# 提示词模板
prompt_templates:
  read_file_request: "请读取文件 {{file_path}}，并告诉我文件内容和大小。"
  write_file_request: "请在 {{file_path}} 文件中写入以下内容：{{content}}"

# 安全注意事项
security_notes:
  - 文件路径验证：确保文件路径在允许的目录范围内
  - 内容安全：避免写入恶意代码或敏感信息
  - 权限检查：确保有足够的文件系统权限

# 配置参数
config:
  allowed_directories:
    - "."
    - "./data"
    - "./outputs"
  max_file_size: 10485760 # 10MB
  allowed_file_types:
    - ".txt"
    - ".md"
    - ".yaml"
    - ".yml"
    - ".json"
